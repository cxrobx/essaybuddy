services:
  web:
    build: ./web
    ports:
      - "${WEB_PORT:-3031}:3000"
    environment:
      - API_URL=${API_URL:-http://host.docker.internal:8002}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8002}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
