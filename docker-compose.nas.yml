services:
  zora-api:
    build: ./api
    environment:
      - DATA_ROOT=/data
      - AI_PROVIDER=${AI_PROVIDER:-codex}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - zora-data:/data
    networks:
      - zora-net
    restart: always

  zora-web:
    build:
      context: ./web
      args:
        - NEXT_PUBLIC_API_URL=http://zora-api:8002
    ports:
      - "${WEB_PORT:-18811}:3000"
    environment:
      - API_URL=http://zora-api:8002
      - NEXT_PUBLIC_API_URL=http://zora-api:8002
      - NEXTAUTH_URL=https://zora.chrisx.art
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    networks:
      - zora-net
    depends_on:
      - zora-api
    restart: always

volumes:
  zora-data:

networks:
  zora-net:
    driver: bridge
